<!DOCTYPE html><html lang="en-us"><head>    <title>Granny Original</title>    <meta charset="utf-8">    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/granny@212c543a85b243c4a0b92211f557e760d83d2292/TemplateData/style.css">    <script src="https://cdn.jsdelivr.net/gh/bubbls/granny@212c543a85b243c4a0b92211f557e760d83d2292/sdk.js"></script>    <style>        body { margin:0; padding:0; overflow:hidden; background:#000; }        #unity-container { width:100%; height:100%; position:relative; }        #fullscreen-btn {            position:absolute; top:10px; right:10px;            padding:10px 20px; background:#4caf50; color:#fff;            font-weight:bold; border:none; border-radius:5px; cursor:pointer; z-index:1000;        }    </style></head><body>    <div id="unity-container">        <canvas id="unity-canvas" style="width:100%; height:100%;"></canvas>        <button id="fullscreen-btn">Play Fullscreen</button>    </div>    <script>        document.getElementById('fullscreen-btn').addEventListener('click', () => {            window.open(window.location.href, '_blank');        });        const canvas = document.getElementById('unity-canvas');        async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension) {            const buffers = [];            for (let i = 1; i <= totalParts; i++) {                const response = await fetch(`${baseUrl}/${filePrefix}_part${i}.${extension}`);                buffers.push(await response.arrayBuffer());            }            const totalLength = buffers.reduce((a,b)=>a+b.byteLength,0);            const combined = new Uint8Array(totalLength);            let offset=0; buffers.forEach(b=>{combined.set(new Uint8Array(b),offset); offset+=b.byteLength;});            return combined;        }        let myGameInstance = null;        async function initializeGame() {            const buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";            const loaderUrl = buildUrl + "/Granny.loader.js";            const dataBuffer = await mergeUnityWebFiles(buildUrl, "Granny", 2, "data");            const wasmBuffer = await mergeUnityWebFiles(buildUrl, "Granny", 2, "wasm");            const dataBlob = URL.createObjectURL(new Blob([dataBuffer]));            const wasmBlob = URL.createObjectURL(new Blob([wasmBuffer]));            const config = {                dataUrl: dataBlob,                frameworkUrl: buildUrl + "/Granny.framework.js",                codeUrl: wasmBlob,                streamingAssetsUrl: buildUrl + "/StreamingAssets",                companyName: "Anastasia Kazantseva",                productName: "Granny",                productVersion: "1.0",            };            const script = document.createElement("script");            script.src = loaderUrl;            script.onload = () => {                createUnityInstance(canvas, config, progress=>{console.log(progress);})                    .then(instance=>{myGameInstance=instance;});            };            document.body.appendChild(script);        }        initializeGame();    </script></body></html>
